        function onpageload() {
            // Get the header
            var contentElement = document.getElementById('content')
            var table = document.createElement('table')
            table.cellSpacing = 0
            contentElement.appendChild(table)
            row = document.createElement('tr')
            table.appendChild(row)
            col = document.createElement('th')
            col.innerText = 'm/d'
            row.appendChild(col)
            col = document.createElement('th')
            col.innerText = 'Celebrate'
            row.appendChild(col)
            for (i = 0; i < jsonWishesList.length; ++i) {
                var color = "white";
                if (
                    nextFour == -1 &&
                    (
                        (jsonWishesList[i].month > currentDate.getMonth() + 1)
                        ||
                        (jsonWishesList[i].month == currentDate.getMonth() + 1 && jsonWishesList[i].date >= currentDate.getDate())
                    )
                ) {
                    nextFour = 0;
                }
                if (nextFour != -1 && nextFour < 4) {
                    color = "#00EB00";
                    ++nextFour;
                } else {
                    color = 'white'
                }
                row = document.createElement('tr')
                if (nextFour == 1) {
                    visibleRow = row
                }
                row.bgColor = color
                table.appendChild(row)
                col = document.createElement('td')
                col.innerText = jsonWishesList[i].month + "/" + jsonWishesList[i].date
                row.appendChild(col)
                col = document.createElement('td')
                if (
                    jsonWishesList[i].month == currentDate.getMonth() + 1 &&
                    jsonWishesList[i].date == currentDate.getDate()
                ) {
                    wish = document.createElement('a')
                    wish.href = "https://api.whatsapp.com/send?text=" + "Radhekrishna!%20" + jsonWishesList[i].wish.replace("Birthday", "Happy%20Birthday%F0%9F%8E%82").replace("Wedding Anniversary", "Happy%20Wedding%20Anniversary%F0%9F%92%90")
                    wish.innerText = jsonWishesList[i].wish
                    col.appendChild(wish)
                } else {
                    col.innerText = jsonWishesList[i].wish
                }
                row.appendChild(col)
            }

            setTimeout(scrollToElement, 10)
        }

        function scrollToElement() {
            if (visibleRow != null) {
                visibleRow.scrollIntoView({ behavior: "instant" })
            } else {
